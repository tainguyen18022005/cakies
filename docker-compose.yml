version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: cakies_db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Cakies@123  # mật khẩu hợp lệ (>=8 ký tự, có chữ hoa, chữ thường, số, ký tự đặc biệt)
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "StrongPassw0rd!", "-Q", "SELECT 1"]
      interval: 60s
      timeout: 40s
      retries: 10

  backend:
    build:
      context: ./cakies-backend
      dockerfile: Dockerfile
    container_name: cakies_backend
    environment:
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_USER=sa
      - DB_PASSWORD=Cakies@123
      - DB_NAME=CakiesDB
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./cakies-frontend
      dockerfile: Dockerfile
    container_name: cakies_frontend
    ports:
      - "5173:80"   # Nginx chạy cổng 80 trong container, map ra 5173 ở host
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlserver_data:
