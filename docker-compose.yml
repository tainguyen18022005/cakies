version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cakies_db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Cakies@12345
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Cakies@12345", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./cakies-backend
      dockerfile: Dockerfile
    container_name: cakies_backend
    environment:
      - DB_HOST=sqlserver
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./cakies-frontend
      dockerfile: Dockerfile
    container_name: cakies_frontend
    ports:
      - "5173:80" # Nginx chạy cổng 80 trong container, map ra 5173 ở host
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlserver_data:
